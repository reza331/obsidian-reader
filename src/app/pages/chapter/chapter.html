<div class="bg-zinc-900 w-dvw px-10 top-17 fixed py-5 text-xs font-semibold">

        <span class="text-teal-500">Scanlation group</span> : {{chapterStore.scangroup() || 'N/A'}}

<main class="container mt-33">

    </div>
