<header [class]="isScrolled() ? 'blackGlass' : 'glass' "
    class="border-b-2 backdrop-blur-xs fixed top-0 start-0 w-dvw z-99">
    <nav class="container flex items-center justify-between px-7 lg:px-11 py-3">
        <!-- logo temp placeholder -->
        <div class="w-full">
            <div class="w-fit flex flex-col items-center">
                <h2 class="text-xl font-bold whitespace-nowrap">Obsidian Reader</h2>
                <a target="_blank" href="https://api.mangadex.org/docs/" class="text-xs whitespace-nowrap mt-0.5 text-gray-400">Powered by <span class="text-orange-500 font-semibold">Mangadex</span> api</a>
            </div>
        </div>
        <!-- nav links desktop -->
        <ul class="hidden  w-full lg:flex items-center justify-center gap-5">
            @for (item of navLinks(); track $index) {
            <li class="desktopLi">
                <a routerLinkActive="text-teal-500 font-bold" [routerLinkActiveOptions]="{exact: item.url === '/'}"
                    [routerLink]="item.url">{{ item.label }}</a>
            </li>
            }
        </ul>
        <!-- mobile -->
        <div class="flex items-center gap-5 lg:hidden mt-1">
            <!-- search icon -->
            <button (click)="searchMobileUi.openMobileSearch()">
                <search-button/>
            </button>
            <!-- hamburger button -->
            <button (click)="openMenu()">
                <hamburger-button />
            </button>       
        </div>
        <!-- searchBar -->
        <div class="hidden lg:flex w-full justify-end">
            <app-search />
        </div>
    </nav>
</header>

<!-- nav links mobile -->
<div [class]="`${isOpen() ? 'translate-x-0' : '-translate-x-full'}`"
    class="lg:hidden w-60 bg-zinc-900 h-dvh fixed top-0 left-0 z-9999 duration-300 transition-[translate] p-5">
    <!-- logo -->
    <h2 class="w-full text-xl font-bold border-b-2 pb-5 mb-5 border-gray-500">Obsidian Reader</h2>
    <!-- links -->
    <ul class="w-full flex flex-col justify-center gap-5 ps-3">
        @for (item of navLinks(); track $index) {
        <li>
            <a [routerLinkActive]="['text-teal-500']" [routerLinkActiveOptions]="{exact: item.url === '/'}"
                [routerLink]="item.url">{{ item.label }}</a>
        </li>
        }
    </ul>
</div>
<!-- search resultbox mobile -->
 <app-search-mobile />
<!-- close overlay -->
@if (isOpen()) {
<div (click)="closeMenu()" class="lg:hidden fixed w-dvw h-dvh top-0 left-0 bg-black/60 z-100"></div>
}
